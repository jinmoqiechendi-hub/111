<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园地图 - Campus Map</title>
<link rel="stylesheet" href="leaflet.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
  #map { height: 100%; width: 100%; }
  .info-panel {
    position: absolute; top: 10px; right: 10px; z-index: 1000;
    background: rgba(255,255,255,0.95); border-radius: 8px;
    padding: 12px 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    max-width: 260px; font-size: 13px;
  }
  .info-panel h2 { font-size: 16px; margin-bottom: 8px; color: #333; }
  .info-panel p { color: #666; line-height: 1.6; }
  .legend {
    position: absolute; bottom: 30px; left: 10px; z-index: 1000;
    background: rgba(255,255,255,0.95); border-radius: 8px;
    padding: 10px 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    font-size: 13px;
  }
  .legend h3 { font-size: 14px; margin-bottom: 6px; color: #333; }
  .legend-item { display: flex; align-items: center; margin: 5px 0; }
  .legend-color { width: 20px; height: 12px; margin-right: 8px; border-radius: 2px; border: 1px solid #232323; }
  .legend-line { width: 20px; height: 3px; margin-right: 8px; border-radius: 2px; }
  .feature-label {
    background: none; border: none; font-size: 11px;
    color: #333; text-shadow: 0 0 3px white;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="map"></div>
<div class="info-panel">
  <h2>🏫 校园地图</h2>
  <p>📍 建筑：191 栋</p>
  <p>🛣️ 道路：212 条</p>
  <p style="margin-top:6px;font-size:11px;color:#999;">QGIS → GeoJSON → Leaflet<br>底图：OpenStreetMap</p>
</div>
<div class="legend">
  <h3>图例</h3>
  <div class="legend-item">
    <div class="legend-color" style="background:#987DB7;"></div>
    <span>建筑 (紫色)</span>
  </div>
  <div class="legend-item">
    <div class="legend-line" style="background:#FF6600;"></div>
    <span>道路 (橙色)</span>
  </div>
</div>
<script src="leaflet.js"></script>
<script>
var roadStyle = { color: "#FF6600", weight: 3, opacity: 0.85 };
var buildingStyle = {
  fillColor: "#987DB7", color: "#232323",
  weight: 1.5, fillOpacity: 0.75, opacity: 0.9
};
var map = L.map("map").setView([34.775, 113.775], 15);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: '&copy; <a href="https://openstreetmap.org">OSM</a>', maxZoom: 19
}).addTo(map);
var bl = L.geoJSON(null, {
  style: function() { return buildingStyle; },
  onEachFeature: function(f, lyr) {
    var p = f.properties;
    var label = p.name || p["name:zh"] || "";
    if (!label && p.building) label = p.building;
    if (label) lyr.bindTooltip(label, { direction: "top", className: "feature-label" });
    var pop = "<b>" + (label || "建筑") + "</b><br>";
    if (p["name:en"]) pop += "EN: " + p["name:en"] + "<br>";
    if (p.building) pop += "类型: " + p.building + "<br>";
    if (p["building:levels"]) pop += "楼层: " + p["building:levels"] + "<br>";
    if (p.office) pop += "办公: " + p.office + "<br>";
    lyr.bindPopup(pop);
  }
}).addTo(map);
var rl = L.geoJSON(null, {
  style: function() { return roadStyle; },
  onEachFeature: function(f, lyr) {
    var p = f.properties;
    var label = p.name || p.fclass || "";
    if (label) lyr.bindTooltip(label, { direction: "top", className: "feature-label" });
    var pop = "<b>" + (label || "道路") + "</b><br>";
    if (p.fclass) pop += "类型: " + p.fclass + "<br>";
    if (p.maxspeed) pop += "限速: " + p.maxspeed + " km/h<br>";
    lyr.bindPopup(pop);
  }
}).addTo(map);
Promise.all([
  fetch("buildings.min.geojson").then(function(r) { return r.json(); }),
  fetch("campus_roads.min.geojson").then(function(r) { return r.json(); })
]).then(function(results) {
  bl.addData(results[0]);
  rl.addData(results[1]);
  var all = results[0].features.concat(results[1].features);
  if (all.length > 0) {
    map.fitBounds(L.geoJSON({ type: "FeatureCollection", features: all }).getBounds(), { padding: [20, 20] });
  }
  console.log("Loaded: " + results[0].features.length + " buildings, " + results[1].features.length + " roads");
}).catch(function(e) { console.error(e); });
</script>
</body>
</html>
